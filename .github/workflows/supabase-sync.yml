name: Sync Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - "scripts/supabase-sync.sh"
      - ".github/workflows/supabase-sync.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Ensure required Supabase secrets exist
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing secret: SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing secret: SUPABASE_DB_PASSWORD" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "Missing secret: SUPABASE_PROJECT_REF" && exit 1)

      - name: Sync remote Supabase migrations
        run: ./scripts/supabase-sync.sh

